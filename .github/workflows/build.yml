name: Build Slicky

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build (runs on every push / PR – no secrets needed)
  # Produces an unsigned .app you can download and run locally
  # with:  xattr -cr Slicky.app && open Slicky.app
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (unsigned)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install xcodegen
        run: |
          curl -L -o /tmp/xcodegen.zip \
            "https://github.com/yonaskolb/XcodeGen/releases/download/2.45.0/xcodegen.artifactbundle.zip"
          unzip -o /tmp/xcodegen.zip -d /tmp/xcodegen_bundle
          sudo cp /tmp/xcodegen_bundle/xcodegen.artifactbundle/xcodegen-2.45.0-macosx/bin/xcodegen \
            /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Slicky.xcodeproj \
            -scheme Slicky

      - name: Build
        run: |
          xcodebuild \
            -project Slicky.xcodeproj \
            -scheme Slicky \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .app as zip
        run: |
          APP="$RUNNER_TEMP/DerivedData/Build/Products/Release/Slicky.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/Slicky-unsigned.zip"

      - name: Upload unsigned build
        uses: actions/upload-artifact@v4
        with:
          name: Slicky-unsigned
          path: ${{ runner.temp }}/Slicky-unsigned.zip
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Job 2: Signed + notarized release (runs on version tags)
  # Requires secrets – see README for setup instructions
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release (signed + notarized)
    runs-on: macos-13
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install xcodegen
        run: |
          curl -L -o /tmp/xcodegen.zip \
            "https://github.com/yonaskolb/XcodeGen/releases/download/2.45.0/xcodegen.artifactbundle.zip"
          unzip -o /tmp/xcodegen.zip -d /tmp/xcodegen_bundle
          sudo cp /tmp/xcodegen_bundle/xcodegen.artifactbundle/xcodegen-2.45.0-macosx/bin/xcodegen \
            /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          # Write the .p12 from the base64 secret
          echo "$DEVELOPER_ID_P12" | base64 --decode > /tmp/certificate.p12

          # Create a temporary keychain so we don't touch the login keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import the certificate
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm /tmp/certificate.p12

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Slicky.xcodeproj \
            -scheme Slicky

      - name: Build (Release, signed)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Slicky.xcodeproj \
            -scheme Slicky \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -destination "platform=macOS" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            build

      - name: Verify code signature
        run: |
          APP="$RUNNER_TEMP/DerivedData/Build/Products/Release/Slicky.app"
          codesign --verify --deep --strict "$APP"
          codesign -dv "$APP"

      - name: Create DMG
        run: |
          APP="$RUNNER_TEMP/DerivedData/Build/Products/Release/Slicky.app"
          mkdir -p /tmp/dmg-contents
          cp -R "$APP" /tmp/dmg-contents/
          # Create a symlink to /Applications for the drag-to-install UX
          ln -s /Applications /tmp/dmg-contents/Applications

          hdiutil create \
            -volname "Slicky" \
            -srcfolder /tmp/dmg-contents \
            -ov \
            -format UDZO \
            /tmp/Slicky.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit /tmp/Slicky.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait \
            --timeout 20m

      - name: Staple notarization ticket
        run: xcrun stapler staple /tmp/Slicky.dmg

      - name: Upload DMG as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/Slicky.dmg
          generate_release_notes: true
